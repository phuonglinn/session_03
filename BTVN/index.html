<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sinh Viên</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Hệ Thống Quản Lý Sinh Viên</h1>

        <div id="notification-area" class="notification hidden"></div>

        <div class="header-actions">
            <button id="btn-open-form">Thêm sinh viên</button>
            
            <div class="statistics-area">
                <p>Tổng số sinh viên: <span id="total-students">0</span></p>
                <p>Điểm trung bình lớp: <span id="average-score">0.0</span></p>
            </div>
        </div>

        <table id="student-table">
            <thead>
                <tr>
                    <th>Mã SV</th>
                    <th>Họ và Tên</th>
                    <th>Ngày Sinh</th>
                    <th>Lớp Học</th>
                    <th>Điểm TB</th>
                    <th>Email</th>
                    <th>Hành Động</th>
                </tr>
            </thead>

            <tbody id="student-tbody"></tbody>
        </table>
    </div>

    <div id="form-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="form-title">Thêm Mới Sinh Viên</h2>
            
            <form id="student-form" novalidate>
                <div class="form-group">
                    <label for="student-id">Mã sinh viên (*)</label>
                    <input type="text" id="student-id" placeholder="Ví dụ: SV001">
                    <span class="error-message" id="error-student-id"></span>
                </div>
                
                <div class="form-group">
                    <label for="fullname">Họ và tên (*)</label>
                    <input type="text" id="fullname" placeholder="Nhập đầy đủ họ tên">
                    <span class="error-message" id="error-fullname"></span>
                </div>
                
                <div class="form-group">
                    <label for="dob">Ngày sinh (*)</label>
                    <input type="date" id="dob">
                    <span class="error-message" id="error-dob"></span>
                </div>
                
                <div class="form-group">
                    <label for="class-name">Lớp học (*)</label>
                    <input type="text" id="class-name" placeholder="Nhập tên lớp học">
                    <span class="error-message" id="error-class-name"></span>
                </div>
                
                <div class="form-group">
                    <label for="gpa">Điểm trung bình (*)</label>
                    <input type="number" id="gpa" step="0.1" placeholder="Nhập số từ 0 đến 10">
                    <span class="error-message" id="error-gpa"></span>
                </div>
                
                <div class="form-group">
                    <label for="email">Email (*)</label>
                    <input type="email" id="email" placeholder="example@gmail.com">
                    <span class="error-message" id="error-email"></span>
                </div>

                <div class="form-actions">
                    <button type="submit" id="btn-save">Lưu</button>
                    <button type="button" id="btn-close-form">Đóng/Hủy</button>
                </div>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
